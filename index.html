<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrimeSight – Crime Analysis in India</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>

<h1>CrimeSight: Data-Driven Insights for Public Safety</h1>

<div id="controls">
  <select id="cityFilter"></select>
  <select id="crimeFilter"></select>
  <select id="yearFilter"></select>
</div>

<div class="chart-container">
  <h2>Spatial & Temporal Crime Distribution</h2>
  <div class="q1-grid">
    <div class="panel">
      <div class="panel-title">India City Hotspots</div>
      <svg id="mapChart"></svg>
    </div>
    <div class="panel">
      <div class="panel-title">Time Hotspots (Weekday × Hour)</div>
      <svg id="heatmapChart"></svg>
    </div>
  </div>
</div>

<div class="chart-container">
  <h2>Police Deployment vs Case Closure</h2>
  <svg id="scatterChart"></svg>
</div>

<div class="chart-container">
  <h2>Victim Demographics Analysis</h2>
  <svg id="demographicChart"></svg>
</div>

<div id="tooltip" class="tooltip" aria-hidden="true"></div>

<script src="js/preprocess.js"></script>
<script src="js/mapView.js"></script>
<script src="js/scatterView.js"></script>
<script src="js/demographicView.js"></script>
<script src="js/main.js"></script>

</body>
</html>
